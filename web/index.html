<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapchat Archive</title>
  <link rel="stylesheet" href="./styles.css">
  <link href="//vjs.zencdn.net/8.23.4/video-js.min.css" rel="stylesheet">
  <script src="//vjs.zencdn.net/8.23.4/video.min.js"></script>
  <style>
    /* ── Inline media hover ─────────────────────────────────── */
    .media-item { transition: transform 0.15s; }
    .media-item:hover { transform: scale(1.02); }

    /* ── .vjs-snapback — inline portrait skin ───────────────── */
    .vjs-snapback {
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      display: block;
    }
    /* Hide controls we don't want inline */
    .vjs-snapback .vjs-play-control,
    .vjs-snapback .vjs-progress-control,
    .vjs-snapback .vjs-remaining-time,
    .vjs-snapback .vjs-duration,
    .vjs-snapback .vjs-fullscreen-control,
    .vjs-snapback .vjs-picture-in-picture-control,
    .vjs-snapback .vjs-playback-rate,
    .vjs-snapback .vjs-subs-caps-button,
    .vjs-snapback .vjs-chapters-button { display: none !important; }
    /* Show current time */
    .vjs-snapback .vjs-current-time { display: flex !important; padding-left: 6px; }
    /* Gradient bar at the bottom, compact height */
    .vjs-snapback .vjs-control-bar {
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
      height: 38px;
      align-items: center;
    }
    .vjs-snapback .vjs-current-time-display { font-size: 13px; font-weight: 600; line-height: 38px; }
    /* Big play button — circular, centered */
    .vjs-snapback .vjs-big-play-button {
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 52px; height: 52px; line-height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.45);
      font-size: 18px;
    }
    .vjs-snapback .vjs-big-play-button .vjs-icon-placeholder::before { margin-left: 2px; }
    .vjs-snapback:hover .vjs-big-play-button { background: rgba(0,0,0,0.65); }
    /* Volume / mute panel */
    .vjs-snapback .vjs-volume-panel { margin-left: auto; margin-right: 4px; }

    /* ── Lightbox overlay ───────────────────────────────────── */
    #lightbox {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.93);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox-close {
      position: absolute; top: 16px; right: 20px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 20px; line-height: 1;
      width: 38px; height: 38px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #lightbox-close:hover { background: rgba(255,255,255,0.18); }
    #lightbox-counter {
      position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 13px; pointer-events: none;
    }
    /* Row: arrows flanking the media */
    #lightbox-row { display: flex; align-items: center; gap: 16px; }
    #lightbox-prev, #lightbox-next {
      flex-shrink: 0;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 26px; line-height: 1;
      width: 46px; height: 64px; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #lightbox-prev:hover, #lightbox-next:hover { background: rgba(255,255,255,0.18); }
    #lightbox-media {
      display: flex; align-items: center; justify-content: center;
    }
    #lightbox-media img {
      width: auto; height: auto;
      max-width: min(calc(100vw - 180px), 1000px);
      max-height: 82vh;
      border-radius: 12px; display: block;
    }
    /* .vjs-lightbox — site-matching dark theme, hover-reveal controls */
    #lightbox-media .vjs-lightbox { border-radius: 12px; overflow: hidden; }
    /* Control bar: site dark theme, hidden until hover/active */
    #lightbox-media .vjs-lightbox .vjs-control-bar {
      background: #1a1a1a;
      border-top: 1px solid rgba(255,255,255,0.1);
      opacity: 0; transition: opacity 0.2s;
    }
    #lightbox-media .vjs-lightbox:hover .vjs-control-bar,
    #lightbox-media .vjs-lightbox.vjs-user-active .vjs-control-bar,
    #lightbox-media .vjs-lightbox.vjs-paused .vjs-control-bar { opacity: 1; }
    /* Progress / volume: Snapchat yellow */
    #lightbox-media .vjs-lightbox .vjs-play-progress,
    #lightbox-media .vjs-lightbox .vjs-volume-level { background: #fffc00; }
    #lightbox-media .vjs-lightbox .vjs-play-progress:before { color: #fffc00; }
    /* Seek track and load bar */
    #lightbox-media .vjs-lightbox .vjs-slider { background: rgba(255,255,255,0.2); }
    #lightbox-media .vjs-lightbox .vjs-load-progress { background: rgba(255,255,255,0.15); }
    /* Buttons and time text: white */
    #lightbox-media .vjs-lightbox .vjs-button > .vjs-icon-placeholder:before,
    #lightbox-media .vjs-lightbox .vjs-time-control { color: rgba(255,255,255,0.9); }

    /* ── Voice note audio player ─────────────────────────────── */
    .audio-player {
      display: inline-flex;
      align-items: center;
      gap: 24px;
      background: #2C2C2E;
      border: 2px solid #3A3A3C;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.35);
      user-select: none;
      transform: scale(0.58);
      transform-origin: left center;
      margin-top: -18px;
      margin-bottom: -18px;
    }

    .play-btn {
      flex-shrink: 0;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      transition: opacity .15s;
      align-self: center;
      padding: 0;
    }
    .play-btn:hover    { opacity: .8; }
    .play-btn:disabled { opacity: .35; cursor: default; }

    .waveform-canvas { flex-shrink: 0; display: block; cursor: pointer; }

    .speed-btn {
      flex-shrink: 0;
      background: #3A3A3C;
      border: none;
      border-radius: 8px;
      width: 100px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s;
      align-self: center;
    }
    .speed-btn:hover    { background: #48484A; }
    .speed-btn:disabled { opacity: .35; cursor: default; }
    .speed-btn span {
      font-size: 28px;
      font-weight: 500;
      color: #EBEBF5;
      line-height: 1;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    .time-display {
      flex-shrink: 0;
      font-size: 28px;
      font-weight: 400;
      color: #8E8E93;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      align-self: center;
      min-width: 68px;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
  </style>
</head>

<body>

  <div id="root">
    <div class="h-screen flex flex-col bg-bg-primary overflow-hidden">
      <div class="fixed top-0 left-0 right-0 z-[100] bg-bg-secondary border-b border-border px-5 py-3 min-h-[80px]">
        <div class="absolute left-5 top-1/2 -translate-y-1/2"><button
            class="px-4 py-2 bg-bg-tertiary border border-border rounded text-text-primary text-sm font-medium flex items-center gap-2 transition-all hover:bg-hover-bg hover:border-accent hover:-translate-y-px"
            aria-label="Return to Dashboard"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
              </path>
            </svg>Dashboard</button></div>
        <div class="flex items-center justify-center gap-5"><button
            class="px-4 py-2 bg-bg-tertiary border border-border rounded text-text-primary text-sm font-medium flex items-center gap-1.5 transition-all cursor-pointer hover:bg-hover-bg hover:border-accent hover:-translate-y-px"
            aria-label="Previous day">← Previous Day</button>
          <div class="text-center">
            <h1 class="text-xl text-accent m-0 font-semibold cursor-pointer hover:underline transition-all"
              role="button" tabindex="0" aria-label="Open date picker" id="header-date"></h1>
            <div class="text-xs text-text-secondary mt-1"><span id="header-conversations"></span><span
                class="mx-2">•</span><span id="header-messages"></span><span class="mx-2">•</span><span id="header-media"></span></div>
          </div><button
            class="px-4 py-2 bg-bg-tertiary border border-border rounded text-text-primary text-sm font-medium flex items-center gap-1.5 transition-all cursor-pointer hover:bg-hover-bg hover:border-accent hover:-translate-y-px"
            aria-label="Next day">Next Day →</button>
        </div>
      </div>
      <div class="flex flex-1 overflow-hidden pt-[80px]">
        <div class="w-[350px] bg-bg-secondary border-r border-border flex flex-col overflow-hidden">
          <div class="flex-1 overflow-y-auto py-2 sidebar-scrollbar">
            
            <div id="conversation-list"></div>

          </div>
        </div>
        <div id="right-panel" class="flex-1 flex flex-col bg-bg-primary relative overflow-hidden">
          <div id="no-selection" class="flex-1 flex items-center justify-center flex-col text-text-tertiary">
            <div class="text-6xl mb-4 opacity-50">💬</div>
            <div class="text-lg font-medium">Select a conversation to view</div>
          </div>
        </div>
      </div>
      <div
        class="fixed bottom-5 right-5 bg-bg-secondary px-4 py-3 rounded-lg border border-border text-xs text-text-secondary transition-opacity pointer-events-none opacity-0">
        <strong>Keyboard shortcuts:</strong> ESC = Close, ↑↓ = Navigate, ←→ = Media Navigation</div>
    </div>
  </div>
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Media viewer">
    <button id="lightbox-close" aria-label="Close">✕</button>
    <div id="lightbox-counter"></div>
    <div id="lightbox-row">
      <button id="lightbox-prev" aria-label="Previous media">‹</button>
      <div id="lightbox-media">
        <img id="lightbox-img" style="display:none;" alt="Media">
        <div id="lightbox-vid-wrap"></div>
      </div>
      <button id="lightbox-next" aria-label="Next media">›</button>
    </div>
  </div>
  
  <!-- Date Picker -->
  <div id="date-picker" style="display:none; position:fixed; inset:0; z-index:400; align-items:flex-start; justify-content:center; padding-top:72px; background:rgba(0,0,0,0.5);">
    <div id="date-picker-popup">
      <div class="dp-nav">
        <button id="dp-prev-year"  class="dp-nav-btn" title="Previous year">«</button>
        <button id="dp-prev-month" class="dp-nav-btn" title="Previous month">‹</button>
        <span   id="dp-month-label" class="dp-month-label"></span>
        <button id="dp-next-month" class="dp-nav-btn" title="Next month">›</button>
        <button id="dp-next-year"  class="dp-nav-btn" title="Next year">»</button>
      </div>
      <div id="dp-grid" class="dp-grid">
        <div class="dp-wday">Su</div>
        <div class="dp-wday">Mo</div>
        <div class="dp-wday">Tu</div>
        <div class="dp-wday">We</div>
        <div class="dp-wday">Th</div>
        <div class="dp-wday">Fr</div>
        <div class="dp-wday">Sa</div>
      </div>
    </div>
  </div>

  <div id="day-loading" style="display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; color:#fff; font-size:18px; font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;">
    Loading…
  </div>

  <script type="module" src="./js/main.js"></script>
</body>

</html>
